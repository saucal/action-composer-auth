name: "Composer HTTP Basic Auth"
description: "Configure composer http-basic auth for a private composer repository. Generic: SatisPress (packages.saucal.com) is just the default; call once per repo to authenticate others."
inputs:
  domain:
    description: "Repository domain to authenticate — the composer http-basic key. When empty, resolves from the `PACKAGE_SERVER` repo/org variable, then falls back to packages.saucal.com."
    required: false
    default: ''
  username:
    description: "Auth username. For SatisPress, the SatisPress key. Empty ⇒ no-op."
    required: false
    default: ''
  password:
    description: "Auth password. If empty, defaults to the project's composer.json `homepage` (protocol stripped) — the SatisPress convention. Pass explicitly for other repos."
    required: false
    default: ''
  path:
    description: "Project dir containing composer.json; auth.json is written here (composer reads it when run in this dir)."
    required: false
    default: '.'

runs:
  using: "composite"
  steps:
    - name: Configure composer http-basic auth
      if: ${{ inputs.username != '' }}
      shell: bash
      env:
        # domain: explicit input, else the PACKAGE_SERVER repo/org variable, else SatisPress.
        DOMAIN: ${{ inputs.domain || vars.PACKAGE_SERVER || 'packages.saucal.com' }}
        USERNAME: ${{ inputs.username }}
        PASSWORD: ${{ inputs.password }}
        AUTH_PATH: ${{ inputs.path }}
      run: |
        # No-op for non-composer projects.
        if [ ! -f "${AUTH_PATH}/composer.json" ]; then
          echo "No composer.json in ${AUTH_PATH}; skipping composer auth."
          exit 0
        fi
        # Default the password to the project's homepage (protocol stripped) — the SatisPress
        # convention. Pass `password` explicitly to authenticate any other repo.
        PASS="${PASSWORD}"
        if [ -z "${PASS}" ]; then
          PASS="$( cd "${AUTH_PATH}" && composer config homepage | sed 's,http[s]\?://,,' )"
        fi
        echo "Configuring composer auth for ${DOMAIN}"
        ( cd "${AUTH_PATH}" && composer config "http-basic.${DOMAIN}" "${USERNAME}" "${PASS}" )
